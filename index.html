<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generador de Planes CNB</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://*.supabase.co https://esm.sh; img-src 'self' data:; style-src 'self'; frame-ancestors 'none'">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header class="topbar">
  <h1>Generador de Planes CNB</h1>
  <button id="btnLogout" class="btn btn-icon" aria-label="Cerrar sesión">Salir</button>
</header>

<main class="layout">
  <section class="panel-form">
    <form id="formGenerar" novalidate>
      <div class="form-group">
        <label for="grado">Grado</label>
        <select id="grado" name="grado" required>
          <option value="">Cargando grados...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="area">Área</label>
        <select id="area" name="area" required disabled>
          <option value="">Selecciona un grado primero</option>
        </select>
      </div>

      <div class="form-group campo-con-sugerencias">
        <label for="competencia">Competencia de Grado</label>
        <textarea id="competencia" name="competencia" rows="3" required maxlength="500" placeholder="Selecciona grado y área primero" autocomplete="off" disabled></textarea>
        <ul id="competenciaSugerencias" class="sugerencias-lista hidden"></ul>
        <p class="campo-hint">Escribe al menos 3 letras para ver sugerencias del CNB.</p>
      </div>

      <div class="form-group form-group-check">
        <label class="check-label">
          <input type="checkbox" id="adecuacionNEE">
          Adecuación curricular (Educación Especial / NEE)
        </label>
      </div>

      <button type="submit" class="btn btn-primary">Generar Plan de Clase</button>
    </form>

    <div id="loading" class="loading hidden" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p>Generando plan con IA...</p>
    </div>

    <div id="errorBox" class="error-box hidden" role="alert"></div>
  </section>

  <section class="panel-resultados">
    <div id="resultados" class="hidden">
      <div id="planContent"></div>
      <button id="btnDescargar" class="btn btn-secondary">Descargar Plan (.docx)</button>
      <button id="btnDescargarPdf" class="btn btn-secondary">Descargar Plan (PDF)</button>
    </div>
    <div id="resultadosVacio" class="empty-state">
      <p>Completa el formulario para generar tu plan de clase.</p>
    </div>
  </section>
</main>

<div id="quetzalWrap" class="quetzal-wrap">
  <button id="quetzalToggle" class="quetzal-btn" aria-label="Mostrar consejos del quetzal guía" aria-expanded="false">
    <img src="assets/quetzal/quetzal_normal.svg" alt="" id="quetzalAvatar" width="44" height="44">
  </button>
  <div id="quetzalBurbuja" class="quetzal-burbuja hidden" role="status" aria-live="polite">
    <p id="quetzalTexto">Hola, soy tu quetzal guía del CNB. ¿Qué clase preparamos hoy?</p>
    <button id="quetzalCerrar" class="quetzal-cerrar" aria-label="Cerrar mensaje">×</button>
  </div>
</div>

<script src="js/config/env.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
