<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ingresar - Generador CNB</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://*.supabase.co https://esm.sh; style-src 'self'; frame-ancestors 'none'">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<main class="auth-layout">
  <div class="auth-card">
    <h1>Generador de Planes CNB</h1>
    <form id="formLogin" novalidate>
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
    <p id="authError" class="error-box hidden" role="alert"></p>
    <button id="btnToggleMode" class="btn btn-link">¿No tienes cuenta? Regístrate</button>
  </div>
</main>
<script src="js/config/env.js"></script>
<script type="module" src="js/ui/authUI.js"></script>
</body>
</html>
